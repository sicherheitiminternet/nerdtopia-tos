# Discord Server Regeln

**§ 1 Respekt und Höflichkeit** 
Behandle alle Mitglieder mit Respekt. Beleidigungen, Mobbing oder Diskriminierung sind verboten. Diskussionen sollten immer in einem respektvollen Ton geführt werden.

**§ 2 Rolle des Owners** 
Der Owner hat in allen Angelegenheiten das letzte Wort, einschließlich Regeländerungen und Moderation.  
Er kann Kanäle sperren, ändern oder löschen sowie Mitglieder verwarnen, stummschalten oder bannen – auch ohne vorherige Warnung oder Angabe eines Grundes. Der Owner kann außerdem Nachrichten jederzeit löschen auch ohne Grund.

**§ 3 Ping-Beschränkungen** 
Pings mit @everyone oder @here sind streng verboten – nur der Owner darf diese verwenden. Pings einzelner Benutzer sind ab sofort erlaubt, außer der gepingte Benutzer ist der Owner. Wenn der Owner gepingt wird, führt dies automatisch zu einem Timeout (1 Stunde). Pings von Rollen dürfen nur genutzt werden, wenn diese für den jeweiligen Kanal vorgesehen und abgesprochen sind.

**§ 4 Werbung & Links** 
Jegliche Form von Werbung (Server, Produkte, Websites) ist verboten.  
Links dürfen nur mit ausdrücklicher Genehmigung des Owners gepostet werden.  
Unerwünschte Werbung oder unerlaubte Links werden umgehend entfernt – dies gilt auch für direkte Nachrichten an den Owner.

**§ 5 Minderjährige – Schutz & Regeln** 
Mitglieder unter 18 Jahren dürfen alle Rollen auswählen. Altersangaben müssen korrekt sein; falsche Angaben können zu Warnungen, Rollenkorrektur oder Bann führen. Minderjährige müssen die Anweisungen des Owners strikt befolgen. Verstöße gegen Regeln durch Minderjährige werden unmittelbar dem Owner gemeldet. Alle Server-Regeln gelten gleichermaßen in Text- und Voice-Kanälen, und der Owner kann bei Verstößen jederzeit direkt intervenieren.

**§ 6** **Datenschutz**
Das Veröffentlichen privater Informationen anderer Personen (Doxing) ist strengstens verboten. Dazu gehören unter anderem echte Namen, Adressen, Screenshots privater Nachrichten, Fotos, Telefonnummern oder jegliche anderen persönlichen Daten.
Voice-Kanäle: Auch in Voice-Kanälen dürfen keine privaten Informationen geteilt werden. Dazu zählen insbesondere das Vorlesen von Nachrichten, das Nennen von Adressen, Telefonnummern oder anderen privaten Details. Verstöße werden sofort sanktioniert.
Private Daten dürfen nur mit ausdrücklicher Zustimmung der betroffenen Person geteilt werden. Dies gilt sowohl für Text- als auch für Voice-Kanäle. Ebenfalls verboten ist das Teilen von Inhalten dieses Servers außerhalb dieses Servers.

**§ 7** **Tickets – Regeln**
In Tickets gelten alle Server-Regeln genauso wie im Rest des Servers. Mitglieder müssen respektvoll kommunizieren, keine verbotenen Inhalte posten und die Anweisungen des Owners strikt befolgen. Der Owner kann jederzeit direkt in ein Ticket eingreifen, Anweisungen geben oder bei Verstößen sofort sanktionieren. Team-Mitglieder, die Tickets bearbeiten, müssen ebenfalls die Anweisungen des Owners beachten und dürfen keine eigenen Entscheidungen treffen, die den Serverregeln widersprechen. 

**§ 8** **Keine NSFW-Inhalte**
Das Posten von NSFW-Inhalten ist strengstens verboten.

**§ 9** **Keine illegalen Aktivitäten**
Piraterie, Hacking oder andere illegale Aktivitäten sind strengstens verboten.

 **§ 10** **Nutzung der Kanäle**
Verwende die Kanäle ausschließlich für die dafür vorgesehenen Themen. Der Owner kann Kanäle jederzeit ändern oder sperren.

**§ 11** **Voice-Kanäle**
In den Voice-Kanälen gilt ein respektvoller Umgangston. Auch hier kann der Owner Kanäle anpassen oder sperren. Hier gelten ebenfalls alle anderen Regeln auch. 

**§ 12** **Discord ToS**
Bitte haltet dich an die Discord ToS, da sie die offiziellen Nutzungsbedingungen der Plattform enthalten.
https://discord.com/terms

**§ 13** **Regeln** 
Beim Betreten des Severs stimmst du automatisch den Regeln zu. Achtung! Unwissenheit schützt vor Strafe nicht!
 
**§ 14** **Anzeigename, Benutzername, Profilbild & „Über mich“-Texte**
Wähle angemessene Anzeigenamen, Benutzernamen, Profilbilder und „Über mich“-Texte. Sie dürfen nicht beleidigend, sexuell, verstörend oder provokativ sein.
Verwende keine echten Personen oder urheberrechtlich geschützten Inhalte ohne Erlaubnis.

**§ 15** **Urheberrecht**
Alle Inhalte auf dem Server (Bilder, Texte, Musik, Videos etc.) unterliegen dem Urheberrecht.
Es dürfen keine urheberrechtlich geschützten Inhalte ohne ausdrückliche Erlaubnis des Rechteinhabers gepostet oder verbreitet werden.

**§ 16 Eigene AGB**
Für die Nutzung dieses Servers gelten zusätzlich die eigenen AGB des Servers, die auf GitHub veröffentlicht sind. Dort werden rechtliche Rahmenbedingungen, Datenschutz, Urheberrechte und Pflichten der Mitglieder definiert.
Mit der Nutzung des Servers erklären sich alle Mitglieder automatisch mit diesen AGB einverstanden.
Die aktuellen AGB findest du hier: https://sicherheitiminternet.github.io/nerdtopia-tos/agb.html

**§ 17** **Regelwerk**
Der Owner kann dieses Regelwerk jederzeit ändern und ab dann wo es hier steht ist es gültig.




**Hast du Fragen?**
